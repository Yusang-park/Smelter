name: idea-to-pr
description: |
  Full idea-to-PR pipeline with parallel review.
  Analyze → Architect → Implement → Validate → 3-way Review → Synthesize

nodes:
  - id: analyze
    command: analyze-codebase
    context: fresh

  - id: architect
    command: design-architecture
    depends_on: [analyze]
    context: fresh
    model: claude-opus-4-6

  - id: implement
    command: implement-solution
    depends_on: [architect]
    context: fresh
    model: claude-opus-4-6

  - id: typecheck
    bash: "npx tsc --noEmit 2>&1 || true"
    depends_on: [implement]

  - id: e2e
    bash: "npx playwright test --reporter=json 2>/dev/null || true"
    depends_on: [typecheck]

  # 3-way parallel review (same layer = parallel execution)
  - id: code-review
    command: code-review
    depends_on: [e2e]
    context: fresh

  - id: security-review
    command: security-review
    depends_on: [e2e]
    context: fresh

  - id: test-coverage-review
    command: test-coverage-review
    depends_on: [e2e]
    context: fresh

  # Synthesize reviews (one_success = proceed if at least one review completed)
  - id: synthesize
    command: synthesize-review
    depends_on: [code-review, security-review, test-coverage-review]
    trigger_rule: one_success
    context: fresh
