name: autopilot
description: |
  5-phase autonomous pipeline: Analyze → Architect → Critique → Implement (TDD) → QA (E2E)
  Reimplements src/autopilot.ts as a declarative workflow.

nodes:
  - id: analyze
    command: analyze-codebase
    context: fresh

  - id: architect
    command: design-architecture
    depends_on: [analyze]
    context: fresh

  - id: critique
    command: critique-plan
    depends_on: [architect]
    context: fresh

  - id: implement
    command: implement-solution
    depends_on: [critique]
    context: fresh
    model: claude-opus-4-6

  - id: e2e
    bash: "npx playwright test --reporter=json 2>/dev/null || true"
    depends_on: [implement]
